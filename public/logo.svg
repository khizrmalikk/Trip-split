<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- Gold gradient for left half -->
    <linearGradient id="gemGold" x1="18" y1="12" x2="18" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCD34D"/>
      <stop offset="1" stop-color="#92400E"/>
    </linearGradient>

    <!-- Violet gradient for right half -->
    <linearGradient id="gemViolet" x1="46" y1="12" x2="46" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C4B5FD"/>
      <stop offset="1" stop-color="#4C1D95"/>
    </linearGradient>

    <!-- Amber glow drop shadow -->
    <filter id="gemFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#F59E0B" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Gem body with glow -->
  <g filter="url(#gemFilter)">
    <!-- Left half - gold -->
    <path d="M18,12 L32,12 L32,60 L6,32 Z" fill="url(#gemGold)"/>
    <!-- Right half - violet -->
    <path d="M32,12 L46,12 L58,32 L32,60 Z" fill="url(#gemViolet)"/>
  </g>

  <!-- Outline -->
  <path d="M18,12 L46,12 L58,32 L32,60 L6,32 Z" fill="none" stroke="white" stroke-width="0.5" stroke-opacity="0.15"/>

  <!-- Internal facet lines -->
  <g stroke="white" stroke-width="0.8" stroke-linecap="round">
    <line x1="18" y1="12" x2="6" y2="32" opacity="0.2"/>
    <line x1="46" y1="12" x2="58" y2="32" opacity="0.2"/>
    <line x1="18" y1="12" x2="32" y2="32" opacity="0.25"/>
    <line x1="46" y1="12" x2="32" y2="32" opacity="0.25"/>
    <line x1="6" y1="32" x2="32" y2="60" opacity="0.2"/>
    <line x1="58" y1="32" x2="32" y2="60" opacity="0.2"/>
  </g>

  <!-- Center dividing line -->
  <line x1="32" y1="12" x2="32" y2="60" stroke="white" stroke-width="1.2" stroke-opacity="0.5" stroke-linecap="round"/>

  <!-- Glowing dot at top center -->
  <circle cx="32" cy="12" r="5" fill="white" opacity="0.12"/>
  <circle cx="32" cy="12" r="2" fill="white" opacity="0.9"/>
</svg>
